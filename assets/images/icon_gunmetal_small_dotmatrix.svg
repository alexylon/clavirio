<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 533 533">
  <defs>
    <!-- Outer bezel gradient - gun metal -->
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a6e73"/>
      <stop offset="15%" stop-color="#555960"/>
      <stop offset="50%" stop-color="#3a3d42"/>
      <stop offset="85%" stop-color="#484c52"/>
      <stop offset="100%" stop-color="#2a2d31"/>
    </linearGradient>
    <!-- Inner screen gradient -->
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000f00"/>
      <stop offset="100%" stop-color="#000f00"/>
    </linearGradient>
    <!-- Dot pattern - dim background -->
    <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="4.5" fill="#ffffff" opacity="0.12"/>
    </pattern>
    <!-- Dot pattern - glow around letter -->
    <pattern id="glowdots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="4.5" fill="#20ff20" opacity="0.95"/>
    </pattern>
    <!-- Glow behind letter -->
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#33ff33" stop-opacity="0.12"/>
      <stop offset="30%" stop-color="#33ff33" stop-opacity="0.06"/>
      <stop offset="55%" stop-color="#33ff33" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#33ff33" stop-opacity="0"/>
    </radialGradient>
    <!-- Glossy highlight -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Dome highlight - radial shine -->
    <radialGradient id="dome" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Dome edge shadow - vignette for convex look -->
    <radialGradient id="dome-edge" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="85%" stop-color="#000000" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>
    <!-- Blur for glow around shapes -->
    <filter id="cblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="ledblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <!-- C letter glow filters - layered for soft falloff -->
    <filter id="cglow-wide" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
    <filter id="cglow-mid" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="cglow-tight" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <!-- Cursor glow filters - layered for soft falloff -->
    <filter id="cursorglow-wide" x="-200%" y="-20%" width="500%" height="140%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
    <filter id="cursorglow-mid" x="-150%" y="-15%" width="400%" height="130%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="cursorglow-tight" x="-100%" y="-10%" width="300%" height="120%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <!-- Mask: blurred C for glow -->
    <mask id="cmask-glow">
      <path transform="translate(87.2 424) scale(0.56 -0.56)" fill="white" stroke="white" stroke-width="14" stroke-linejoin="round" filter="url(#cblur)" d="M304 -10Q238 -10 188.5 15.0Q139 40 112.0 87.5Q85 135 85 200V350Q85 416 112.0 463.0Q139 510 188.5 535.0Q238 560 304 560Q399 560 457.0 509.0Q515 458 518 370H428Q425 423 392.5 451.5Q360 480 304 480Q245 480 210.0 446.5Q175 413 175 351V200Q175 138 210.0 104.0Q245 70 304 70Q360 70 392.5 99.0Q425 128 428 180H518Q515 92 457.0 41.0Q399 -10 304 -10Z"/>
    </mask>
    <!-- Mask: sharp cursor block -->
    <mask id="cursormask-sharp">
      <rect x="408" y="73" width="24" height="390" fill="white"/>
    </mask>
    <!-- Mask: blurred cursor for glow -->
    <mask id="cursormask-glow">
      <rect x="408" y="73" width="1" height="390" fill="white" filter="url(#ledblur)"/>
    </mask>
  </defs>

  <!-- Bezel -->
  <rect width="533" height="533" rx="100" fill="url(#bezel)"/>
  <!-- Dark inner border -->
  <rect x="18" y="18" width="497" height="497" rx="82" fill="#111"/>
  <!-- Screen -->
  <rect x="28" y="28" width="477" height="477" rx="72" fill="url(#screen)"/>
  <!-- Dot grid - dim background dots -->
  <rect x="28" y="28" width="477" height="477" rx="72" fill="url(#dots)"/>
  <!-- Dots glowing near the C -->
  <rect x="28" y="28" width="477" height="477" rx="72" fill="url(#glowdots)" mask="url(#cmask-glow)"/>
  <!-- Dots glowing near the cursor -->
  <rect x="28" y="28" width="477" height="477" rx="72" fill="url(#glowdots)" mask="url(#cursormask-glow)"/>
  <!-- C glow - wide ambient -->
  <path transform="translate(87.2 424) scale(0.56 -0.56)" fill="#20ff20" stroke="#20ff20" stroke-width="14" stroke-linejoin="round" opacity="0.08" filter="url(#cglow-wide)" d="M304 -10Q238 -10 188.5 15.0Q139 40 112.0 87.5Q85 135 85 200V350Q85 416 112.0 463.0Q139 510 188.5 535.0Q238 560 304 560Q399 560 457.0 509.0Q515 458 518 370H428Q425 423 392.5 451.5Q360 480 304 480Q245 480 210.0 446.5Q175 413 175 351V200Q175 138 210.0 104.0Q245 70 304 70Q360 70 392.5 99.0Q425 128 428 180H518Q515 92 457.0 41.0Q399 -10 304 -10Z"/>
  <!-- C glow - mid bloom -->
  <path transform="translate(87.2 424) scale(0.56 -0.56)" fill="#20ff20" stroke="#20ff20" stroke-width="14" stroke-linejoin="round" opacity="0.12" filter="url(#cglow-mid)" d="M304 -10Q238 -10 188.5 15.0Q139 40 112.0 87.5Q85 135 85 200V350Q85 416 112.0 463.0Q139 510 188.5 535.0Q238 560 304 560Q399 560 457.0 509.0Q515 458 518 370H428Q425 423 392.5 451.5Q360 480 304 480Q245 480 210.0 446.5Q175 413 175 351V200Q175 138 210.0 104.0Q245 70 304 70Q360 70 392.5 99.0Q425 128 428 180H518Q515 92 457.0 41.0Q399 -10 304 -10Z"/>
  <!-- C glow - tight core -->
  <path transform="translate(87.2 424) scale(0.56 -0.56)" fill="#20ff20" stroke="#20ff20" stroke-width="14" stroke-linejoin="round" opacity="0.16" filter="url(#cglow-tight)" d="M304 -10Q238 -10 188.5 15.0Q139 40 112.0 87.5Q85 135 85 200V350Q85 416 112.0 463.0Q139 510 188.5 535.0Q238 560 304 560Q399 560 457.0 509.0Q515 458 518 370H428Q425 423 392.5 451.5Q360 480 304 480Q245 480 210.0 446.5Q175 413 175 351V200Q175 138 210.0 104.0Q245 70 304 70Q360 70 392.5 99.0Q425 128 428 180H518Q515 92 457.0 41.0Q399 -10 304 -10Z"/>
  <!-- Cursor glow - wide ambient -->
  <rect x="390" y="53" width="60" height="430" rx="30" fill="#10ff10" opacity="0.08" filter="url(#cursorglow-wide)"/>
  <!-- Cursor glow - mid bloom -->
  <rect x="398" y="63" width="44" height="410" rx="22" fill="#15ff15" opacity="0.12" filter="url(#cursorglow-mid)"/>
  <!-- Cursor glow - tight core -->
  <rect x="404" y="68" width="32" height="400" rx="16" fill="#20ff20" opacity="0.16" filter="url(#cursorglow-tight)"/>
