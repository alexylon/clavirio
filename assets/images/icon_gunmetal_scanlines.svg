    <rect x="130.9" y="282.5" width="58.2" height="9" rx="4.5"/>
    <rect x="130.9" y="296.5" width="58.2" height="9" rx="4.5"/>
    <rect x="131.0" y="310.5" width="58.3" height="9" rx="4.5"/>
    <rect x="132.0" y="324.5" width="58.8" height="9" rx="4.5"/>
    <rect x="322.2" y="324.5" width="58.5" height="9" rx="4.5"/>
