    <rect x="212.5" y="422.5" width="93" height="9" rx="4.5"/>
  </g>
  <!-- Cursor - rounded scan line bars -->
  <g fill="#20ff20" opacity="0.35">
    <rect x="408" y="72.5" width="24" height="9" rx="4.5"/>
    <rect x="408" y="86.5" width="24" height="9" rx="4.5"/>
