  <!-- Dome edge shadow -->
  <rect x="28" y="28" width="477" height="477" rx="72" fill="url(#dome-edge)"/>
  <!-- Dome highlight -->
  <rect x="28" y="28" width="477" height="477" rx="72" fill="url(#dome)"/>
