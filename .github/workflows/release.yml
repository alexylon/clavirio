name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          tar czf clavirio-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release clavirio
          zip -j clavirio-${{ matrix.target }}.zip target/${{ matrix.target }}/release/clavirio

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: 7z a clavirio-${{ matrix.target }}.zip ./target/${{ matrix.target }}/release/clavirio.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clavirio-${{ matrix.target }}
          path: clavirio-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            clavirio-*.tar.gz
            clavirio-*.zip
